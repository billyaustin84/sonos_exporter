version: 2
updates:
  # Python dependencies (pyproject.toml). soco is pinned <0.32; dependabot
  # will still open a PR when new versions appear so we notice upstream
  # changes and can widen the pin deliberately.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
